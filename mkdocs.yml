site_name: Devran AI Kit
site_url: https://devran-ai.github.io/kit/
site_description: Trust-Grade AI Development Framework with 34-Module Runtime Engine, 23 Agents, 35 Skills, 37 Commands, 22 Workflows, 568 Tests
site_author: Emre Dursun

repo_name: devran-ai/kit
repo_url: https://github.com/devran-ai/kit

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Agents:
      - Overview: agents/index.md
      - Planner (Deep Dive): agents/planner.md
  - Skills: skills/index.md
  - Commands: commands/index.md
  - Workflows: workflows/index.md
  - Governance: governance/index.md
  - CLI Reference: cli-reference.md
  - Extending: extending.md
  - Telegram Setup: telegram-setup.md
  - Cross-IDE Setup: cross-ide-setup.md
  - FAQ: faq.md
  - Contributing: contributing.md
  - Contributor Guide: contributor-guide.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/devran-ai/kit
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/emre-dursun-nl/
  generator: false
  # SEO Meta Tags
  meta:
    - property: og:type
      content: website
    - property: og:site_name
      content: Devran AI Kit
    - property: og:title
      content: Devran AI Kit — Trust-Grade AI Framework
    - property: og:description
      content: Trust-Grade AI Development Framework with a 34-module runtime engine, 23 agents, 35 skills, 37 commands, and 22 workflows
    - property: og:url
      content: https://devran-ai.github.io/kit/
    - property: og:image
      content: https://devran-ai.github.io/kit/assets/og-image.png
    - name: twitter:card
      content: summary_large_image
    - name: twitter:title
      content: Devran AI Kit
    - name: twitter:description
      content: Trust-Grade AI Development Framework — 34-Module Runtime Engine, 23 Agents, 35 Skills, 37 Commands, 22 Workflows
    - name: twitter:image
      content: https://devran-ai.github.io/kit/assets/og-image.png

copyright: Copyright &copy; 2026 Emre Dursun
